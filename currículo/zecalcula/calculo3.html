<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Investimento</title>
    <script src="js.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calculo3.css">
</head>

<body>

<div class="menu">
    <img src="zec.png">
    <div class="nome">
        <h1>Seu Zé Calcula</h1>
    </div>

    <ul>
        <input type="text" id="nomecalculo" placeholder="Digite o nome do cálculo desejado">
        <button type="button" onclick="buscarcalculo()"><img src="lupa.png"></button>
    </ul>
</div>

<button class="voltar" onclick="comecaragora()">Voltar</button>
<h1>Investimento</h1>

<div class="calculo">

    <div class="top-row">

        <div class="entrada">
            <label for="entrada">Digite seu valor de entrada no investimento:</label>
            <input type="number" id="entrada" min="0" value="1">
        </div>

        <div class="juros">
            <label for="juros">Digite o valor dos juros (por mês):</label>
            <input type="number" id="juros" min="0" value="1">
        </div>

    </div>

    <div class="tempo">
        <label for="tempo">Digite por quanto tempo o dinheiro ficará rendendo:</label>
        <input type="number" id="tempo" min="0" value="1">
    </div>

    <div class="espera">
        <label for="quantespera">Digite quanto você espera ganhar ao final:</label>
        <input type="number" id="quantespera" min="0" value="1">
    </div>

    <div class="resultado">
        <button onclick="calcularinvestimentos()">Calcular</button>
        <p id="resultado">Resultado:</p>
    </div>

</div>

</body>
</html>
