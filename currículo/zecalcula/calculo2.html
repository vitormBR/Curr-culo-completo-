<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Compras Parceladas</title>
    <script src="js.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calculo2.css">
</head>

<body>

<div class="menu">
    <img src="zec.png">
    <div class="nome">
        <h1>Seu Zé Calcula</h1>
    </div>

    <ul>
        <input type="text" id="nomecalculo" placeholder="Digite o nome do cálculo desejado">
        <button type="button" onclick="buscarcalculo()"><img src="lupa.png"></button>
    </ul>
</div>

<button class="voltar" onclick="comecaragora()">Voltar</button>
<h1>Compras Parceladas</h1>

<div class="calculo">

    <div class="top-row">

        <div class="avista">
            <label for="vista">Digite o valor pago à vista:</label>
            <input type="number" id="vista" min="0">
        </div>

        <div class="parcela">
            <label for="valor">Digite o valor de cada parcela:</label>
            <input type="number" id="valor" min="0">
        </div>

    </div>

    <div class="parcelas">
        <label for="parcelas">Digite em quantas parcelas você pagará:</label>
        <input type="number" id="parcelas" min="0">
    </div>

    <div class="resultado">
        <button onclick="calcularcomprasparceladas()">Calcular</button>
        <p id="resultado">Resultado:</p>
    </div>

</div>

</body>
</html>
